        <!-- =========================

        ========================== -->
        <section class="page_title">

            <h2>
                掲示板
            </h2>

            <p>
                制作したスキンの投稿や、
                質問などにご利用ください。
            </p>

        </section>


        <!-- =========================
             投稿フォーム
        ========================== -->
        <section class="bbs_form_section">

            <h3>
                新規投稿
            </h3>

            <form class="bbs_form">

                <!-- 名前 -->
                <div class="form_group">

                    <label for="user_name">
                        名前
                    </label>

                    <input type="text"
                           id="user_name"
                           name="user_name"
                           placeholder="名前を入力">

                </div>


                <!-- タイトル -->
                <div class="form_group">

                    <label for="post_title">
                        タイトル
                    </label>

                    <input type="text"
                           id="post_title"
                           name="post_title"
                           placeholder="タイトルを入力">

                </div>


                <!-- 本文 -->
                <div class="form_group">

                    <label for="post_text">
                        本文
                    </label>

                    <textarea id="post_text"
                              name="post_text"
                              rows="8"
                              placeholder="内容を入力"></textarea>

                </div>


                <!-- 画像 -->
                <div class="form_group">

                    <label for="post_image">
                        画像添付
                    </label>

                    <input type="file"
                           id="post_image"
                           name="post_image"
                           accept="image/*">

                </div>


                <!-- 投稿ボタン -->
                <div class="submit_button">

                    <button type="submit">
                        投稿する
                    </button>

                </div>

            </form>

        </section>


        <!-- =========================
             投稿一覧
        ========================== -->
        <section class="bbs_post_section">

            <h3>
                投稿一覧
            </h3>
